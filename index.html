<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>WordKeep</title>
<script>
  // Inline manifest via blob for GitHub Pages single-file deployment
  const manifest = {
    name: 'WordKeep',
    short_name: 'WordKeep',
    start_url: '.',
    display: 'standalone',
    background_color: '#0f1117',
    theme_color: '#0f1117',
    icons: [{ src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%230f1117"/><text y=".9em" font-size="80" x="10">📖</text></svg>', sizes: 'any', type: 'image/svg+xml' }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const manifestUrl = URL.createObjectURL(blob);
  document.addEventListener('DOMContentLoaded', () => {
    const link = document.createElement('link');
    link.rel = 'manifest'; link.href = manifestUrl;
    document.head.appendChild(link);
  });
  // Service worker for offline shell caching
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const sw = `
        const CACHE = 'wordkeep-v1';
        const SHELL = [location.href];
        self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(SHELL))));
        self.addEventListener('fetch', e => {
          if (e.request.url.includes('api.anthropic.com') || e.request.url.includes('fonts.googleapis')) return;
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
        });
      `;
      const swBlob = new Blob([sw], {type: 'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    });
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #1f2433;
    --border: #2a2f3f;
    --accent: #7eb8f7;
    --accent-dim: rgba(126,184,247,0.12);
    --text: #e8eaf0;
    --text-sub: #7a8299;
    --text-dim: #4a5069;
    --pos-color: #a8d8a8;
    --red: #f07070;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --r: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: var(--serif);
    font-size: 1.5rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .logo span { color: var(--accent); font-style: italic; }
  /* ── HAMBURGER ── */
  .menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: flex-end;
  }
  .menu-btn span {
    display: block;
    height: 2px;
    background: var(--text-sub);
    border-radius: 2px;
    transition: background 0.2s;
  }
  .menu-btn span:nth-child(1) { width: 20px; }
  .menu-btn span:nth-child(2) { width: 14px; }
  .menu-btn span:nth-child(3) { width: 20px; }
  .menu-btn:active span { background: var(--text); }

  /* ── DRAWER ── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(280px, 80vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: calc(24px + env(safe-area-inset-top, 0px)) 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    color: var(--text);
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .drawer-body {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  .drawer-section-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 10px 4px 4px;
  }

  .drawer-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    width: 100%;
    text-align: left;
  }
  .drawer-item:active { border-color: var(--accent); }
  @media (hover: hover) { .drawer-item:hover { border-color: var(--accent); } }
  .drawer-item-icon { font-size: 1.2rem; width: 28px; text-align: center; flex-shrink: 0; }
  .drawer-item-text { flex: 1; }
  .drawer-item-title { font-size: 0.88rem; font-weight: 500; color: var(--text); }
  .drawer-item-desc { font-size: 0.72rem; color: var(--text-sub); margin-top: 2px; line-height: 1.4; }

  .drawer-item.danger .drawer-item-title { color: var(--red); }
  .drawer-item.danger { border-color: rgba(240,112,112,0.15); }
  .drawer-item.danger:active { border-color: var(--red); }

  .drawer-footer {
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: center;
    border-top: 1px solid var(--border);
  }

  /* ── SEARCH BOX ── */
  .search-section {
    padding: 20px;
  }
  .search-wrap {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--r);
    padding: 0 20px;
    min-height: 44px;
    font-family: var(--sans);
    font-size: 0.9rem;
    font-weight: 500;
    color: #0f1117;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .search-btn:active { opacity: 0.8; }
  .search-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── SUGGESTIONS ── */
  .suggestions {
    position: relative;
    z-index: 10;
  }
  .suggestion-list {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .suggestion-item {
    padding: 11px 16px;
    font-family: var(--mono);
    font-size: 0.88rem;
    color: var(--text-sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s, color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:active { background: var(--surface); color: var(--text); }
  @media (hover: hover) { .suggestion-item:hover { background: var(--surface); color: var(--text); } }
  .suggestion-item .sug-word { flex: 1; }
  .suggestion-item .sug-word em {
    font-style: normal;
    color: var(--accent);
  }
  .suggestion-item .sug-badge {
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .search-hint {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--accent);
    padding: 6px 4px 0;
    min-height: 20px;
    transition: opacity 0.2s;
  }
  .result-section {
    padding: 0 20px;
    min-height: 0;
  }
  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    display: none;
  }
  .result-card.visible { display: block; }
  .result-card.loading .card-body { opacity: 0.4; pointer-events: none; }

  .card-top {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .word-display {
    font-family: var(--serif);
    font-size: 2rem;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .phonetic {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-sub);
    margin-top: 4px;
  }
  .pos-badge {
    background: rgba(168,216,168,0.1);
    color: var(--pos-color);
    font-family: var(--mono);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .card-body {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .meaning-en {
    font-size: 0.85rem;
    color: var(--text-sub);
    line-height: 1.5;
  }

  .syn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .syn-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-sub);
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .syn-tag:active { border-color: var(--accent); color: var(--accent); }
  @media (hover: hover) { .syn-tag:hover { border-color: var(--accent); color: var(--accent); } }

  .examples-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .example-item {
    margin-top: 6px;
    padding-left: 12px;
    border-left: 2px solid var(--accent-dim);
  }
  .example-item .en {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.5;
  }
  .example-item .en em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }


  .card-actions {
    display: flex;
    gap: 8px;
  }
  .btn-save {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: var(--sans);
    font-size: 0.88rem;
    font-weight: 500;
    color: #0f1117;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:active { opacity: 0.8; }
  .btn-save.saved {
    background: var(--surface2);
    color: var(--text-sub);
    border: 1.5px solid var(--border);
  }
  .btn-discard {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    min-width: 44px;
    min-height: 44px;
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .sort-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    color: var(--text-sub);
    font-family: var(--mono);
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.15s, color 0.15s;
  }
  .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .section-label {
    padding: 20px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
  .section-label span {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  /* ── WORD LIST ── */
  .word-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px calc(96px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  .word-item {
    background: var(--surface);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .word-item:active { background: var(--surface2); }
  @media (hover: hover) {
    .word-item:hover { background: var(--surface2); }
  }
  .word-item.expanded { border-color: var(--border); }

  .word-item-left { flex: 1; min-width: 0; }
  .word-item-word {
    font-family: var(--serif);
    font-size: 1.15rem;
    letter-spacing: -0.01em;
  }
  .word-item-meaning {
    font-size: 0.78rem;
    color: var(--text-sub);
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .word-item-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .word-item-date {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .btn-delete-inline {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 0.72rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }
  .btn-delete-inline:active { color: var(--red); background: rgba(240,112,112,0.1); }

  .word-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
    margin-top: 10px;
  }
  .word-item.expanded .word-detail { display: block; }
  .word-detail .meaning-jp { font-size: 0.95rem; margin-top: 12px; }
  .word-detail .example-item { margin-top: 10px; }
  .filter-wrap {
    padding: 0 20px 10px;
  }
  .filter-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .filter-input::placeholder { color: var(--text-dim); }
  .filter-input:focus { border-color: var(--accent); }

  .already-saved-banner {
    background: rgba(126,184,247,0.08);
    border: 1px solid rgba(126,184,247,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--accent);
    display: none;
    margin: 0 0 4px;
  }
  .already-saved-banner.visible { display: block; }

  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    width: 52px;
    height: 52px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(126,184,247,0.35);
    z-index: 50;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    font-size: 1.3rem;
  }
  .fab.visible { display: flex; }
  .fab:active {
    transform: scale(0.93);
    box-shadow: 0 2px 10px rgba(126,184,247,0.2);
  }

  /* ── TOAST WITH UNDO ── */
  .toast-undo-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 10px;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    cursor: pointer;
    margin-left: 10px;
    white-space: nowrap;
  }
  .toast {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--text-sub);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(126,184,247,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .result-card.loading .word-display {
    animation: pulse 1.2s ease-in-out infinite;
  }
  .result-card.loading .meaning-jp {
    animation: pulse 1.2s ease-in-out infinite 0.15s;
  }

  .more-link {
    display: block;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    text-decoration: none;
    padding: 0 20px 16px;
    transition: color 0.15s;
  }
  .more-link:active { color: var(--accent); }
  @media (hover: hover) { .more-link:hover { color: var(--accent); } }

  /* ── ERROR ── */
  .error-msg {
    background: rgba(240,112,112,0.1);
    border: 1px solid rgba(240,112,112,0.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--red);
    margin: 0 20px;
    display: none;
  }
  .error-msg.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Word<span>Keep</span></div>
  <button class="menu-btn" onclick="openDrawer()" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Word<span style="color:var(--accent);font-style:italic">Keep</span></div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-section-label">データ管理</div>
    <button class="drawer-item" onclick="exportWords()">
      <div class="drawer-item-icon">⬇️</div>
      <div class="drawer-item-text">
        <div class="drawer-item-title">JSONエクスポート</div>
        <div class="drawer-item-desc">単語帳をファイルに保存</div>
      </div>
    </button>
    <button class="drawer-item" onclick="document.getElementById('importFile').click()">
      <div class="drawer-item-icon">⬆️</div>
      <div class="drawer-item-text">
        <div class="drawer-item-title">JSONインポート</div>
        <div class="drawer-item-desc">バックアップから復元・追加</div>
      </div>
    </button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importWords(event)">

    <div class="drawer-section-label" style="margin-top:8px">その他</div>
    <button class="drawer-item danger" onclick="clearAll()">
      <div class="drawer-item-icon">🗑️</div>
      <div class="drawer-item-text">
        <div class="drawer-item-title">すべて削除</div>
        <div class="drawer-item-desc">保存した単語を全件削除</div>
      </div>
    </button>
  </div>
  <div class="drawer-footer" id="drawerWordCount">0 words saved</div>
</div>

<div class="search-section">
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput"
      placeholder="enter a word..." autocomplete="off" autocorrect="off"
      autocapitalize="none" spellcheck="false">
    <button class="search-btn" id="searchBtn" onclick="lookupWord()">調べる</button>
  </div>
  <div class="search-hint" id="searchHint"></div>
  <div class="suggestions" id="suggestions"></div>
</div>

<div class="result-section">
  <div class="error-msg" id="errorMsg"></div>
  <div class="result-card" id="resultCard">
    <div class="card-top">
      <div>
        <div class="word-display" id="rWord"></div>
        <div class="phonetic" id="rPhonetic"></div>
      </div>
      <div class="pos-badge" id="rPos"></div>
    </div>
    <div class="card-body">
      <div class="already-saved-banner" id="alreadySavedBanner">✓ この単語はすでに保存済みです</div>
      <div class="meaning-en" id="rMeaning"></div>
      <div>
        <div class="examples-label">examples</div>
        <div id="rExamples"></div>
      </div>
      <div id="rSynonyms" class="syn-row" style="display:none"></div>
      <div class="card-actions">
        <button class="btn-save" id="btnSave" onclick="saveWord()">単語帳に保存</button>
        <button class="btn-discard" onclick="dismissResult()">✕</button>
      </div>
      <a class="more-link" id="moreLink" href="" target="_blank" rel="noopener">Merriam-Webster で詳しく →</a>
    </div>
  </div>
</div>

<div class="section-label">
  <span>saved words</span>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="sort-btn" id="sortBtn" onclick="toggleSort()">A–Z</button>
  </div>
</div>
<div class="filter-wrap" id="filterWrap" style="display:none">
  <input type="text" class="filter-input" id="filterInput" placeholder="単語を絞り込む..." oninput="renderList()">
</div>

<div class="word-list" id="wordList"></div>

<button class="fab" id="fab" onclick="focusSearch()" aria-label="検索">🔍</button>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'wordkeep_v1';
let words = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentResult = null;
let expandedId = null;
let sortMode = 'date'; // 'date' | 'alpha'

function toggleSort() {
  sortMode = sortMode === 'date' ? 'alpha' : 'date';
  const btn = document.getElementById('sortBtn');
  btn.textContent = sortMode === 'alpha' ? '新着順' : 'A–Z';
  btn.classList.toggle('active', sortMode === 'alpha');
  renderList();
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('wordList');
  const drawerCount = document.getElementById('drawerWordCount');
  if (drawerCount) drawerCount.textContent = `${words.length} word${words.length !== 1 ? 's' : ''} saved`;
  document.getElementById('fab')?.classList.toggle('visible', words.length >= 5);

  // Preserve scroll position to prevent flicker
  const scrollTop = list.scrollTop;

  const filterWrap = document.getElementById('filterWrap');
  const filterInput = document.getElementById('filterInput');
  filterWrap.style.display = words.length >= 5 ? 'block' : 'none';
  const filterText = (filterInput?.value || '').toLowerCase();

  if (words.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">📖</div>
      <p>調べた単語がここに保存されます<br>上の検索欄から単語を入力してみましょう</p>
    </div>`;
    return;
  }

  const sorted = words.slice().sort((a, b) => {
    if (sortMode === 'alpha') return a.word.localeCompare(b.word);
    return b.savedAt - a.savedAt;
  });

  const filtered = filterText
    ? sorted.filter(w => w.word.toLowerCase().includes(filterText) || (w.definition || w.meaningJp || '').toLowerCase().includes(filterText))
    : sorted;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="icon">🔍</div>
      <p>「${filterText}」に一致する単語はありません</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(w => {
    const isExp = expandedId === w.id;
    const exHtml = (w.examples || []).map(ex => `
      <div class="example-item">
        <div class="en">${highlightWord(ex.en, w.word)}</div>
      </div>
    `).join('');
    return `
    <div class="word-item ${isExp ? 'expanded' : ''}" onclick="toggleExpand('${w.id}')">
      <div class="word-item-left">
        <div class="word-item-word">${w.word}</div>
        <div class="word-item-meaning">${w.definition || w.meaningJp || ''}</div>
        ${isExp ? `
        <div class="word-detail">
          <div class="meaning-en">${w.definition || w.meaningJp || ''}</div>
          ${exHtml}
        </div>` : ''}
      </div>
      <div class="word-item-right">
        <div class="word-item-date">${formatDate(w.savedAt)}</div>
        <button class="btn-delete-inline" onclick="deleteWord(event,'${w.id}')" title="削除">✕</button>
      </div>
    </div>`;
  }).join('');
  list.scrollTop = scrollTop;
}

function highlightWord(sentence, word) {
  const re = new RegExp(`\\b(${word}\\w*)\\b`, 'gi');
  return sentence.replace(re, '<em>$1</em>');
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderList();
}

function deleteWord(e, id) {
  e.stopPropagation();
  deletedWord = words.find(w => w.id === id);
  words = words.filter(w => w.id !== id);
  save();
  renderList();
  showToast('削除しました', true);
}

function clearAll() {
  if (!confirm('保存した単語をすべて削除しますか？')) return;
  words = [];
  save();
  renderList();
  closeDrawer();
}

// ── DRAWER ──
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// ── EXPORT ──
function exportWords() {
  if (words.length === 0) { showToast('保存された単語がありません'); return; }
  const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `wordkeep_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeDrawer();
  showToast(`${words.length}語をエクスポートしました`);
}

// ── IMPORT ──
function importWords(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('invalid format');
      // Merge: skip duplicates by word
      const existingWords = new Set(words.map(w => w.word));
      const newWords = imported.filter(w => w.word && !existingWords.has(w.word));
      words = [...words, ...newWords];
      save();
      renderList();
      closeDrawer();
      showToast(`+${newWords.length}語追加（重複${imported.length - newWords.length}件スキップ）`);
    } catch {
      showToast('読み込みに失敗しました。正しいJSONファイルを選択してください');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── SAVE ──
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
}

// ── LOOKUP (Free Dictionary API) ──
async function lookupWord() {
  const input = document.getElementById('searchInput');
  const word = input.value.trim().toLowerCase();
  if (!word) return;

  const btn = document.getElementById('searchBtn');
  const card = document.getElementById('resultCard');
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.classList.remove('visible');
  document.getElementById('suggestions').innerHTML = '';

  card.classList.remove('visible', 'loading');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  document.getElementById('rWord').textContent = word;
  document.getElementById('rPhonetic').textContent = '';
  document.getElementById('rPos').textContent = '';
  document.getElementById('rMeaning').textContent = '読み込み中...';
  document.getElementById('rExamples').innerHTML = '';

  const btnSave = document.getElementById('btnSave');
  const banner = document.getElementById('alreadySavedBanner');
  const alreadySaved = words.some(w => w.word === word);
  btnSave.textContent = alreadySaved ? '✓ 保存済み' : '単語帳に保存';
  btnSave.className = alreadySaved ? 'btn-save saved' : 'btn-save';
  btnSave.disabled = alreadySaved;
  banner.classList.toggle('visible', alreadySaved);

  card.classList.add('visible', 'loading');

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);

  try {
    const response = await fetch(
      `https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`,
      { signal: controller.signal }
    );
    clearTimeout(timeout);

    if (!response.ok) throw new Error('not_found');
    const data = await response.json();

    // Parse Free Dictionary API response
    const entry = data[0];
    const allMeanings = entry.meanings || [];

    // Phonetic
    const phonetic = entry.phonetic ||
      (entry.phonetics || []).find(p => p.text)?.text || '';

    // First meaning (pos + definition) — find first non-empty definition
    let pos = '';
    let definition = '';
    for (const m of allMeanings) {
      for (const d of (m.definitions || [])) {
        if (d.definition) {
          pos = pos || m.partOfSpeech || '';
          definition = d.definition;
          break;
        }
      }
      if (definition) break;
    }

    // Examples: gather from all meanings, up to 3
    const examples = [];
    for (const m of allMeanings) {
      for (const d of (m.definitions || [])) {
        if (d.example) examples.push({ en: d.example });
        if (examples.length >= 3) break;
      }
      if (examples.length >= 3) break;
    }

    // Synonyms — gather from all meanings
    const synonyms = [];
    for (const m of allMeanings) {
      for (const s of (m.synonyms || [])) {
        if (!synonyms.includes(s)) synonyms.push(s);
        if (synonyms.length >= 5) break;
      }
      if (synonyms.length >= 5) break;
    }

    currentResult = { word: entry.word, phonetic, pos, definition, examples, synonyms };

    document.getElementById('rWord').textContent = entry.word;
    document.getElementById('rPhonetic').textContent = phonetic;
    document.getElementById('rPos').textContent = pos;
    document.getElementById('rMeaning').textContent = definition || '(no definition available)';

    const exHtml = examples.map(ex => `
      <div class="example-item">
        <div class="en">${highlightWord(ex.en, entry.word)}</div>
      </div>`).join('');
    document.getElementById('rExamples').innerHTML = exHtml;

    // Synonyms — use data attribute to avoid XSS from apostrophes in synonym names
    const synEl = document.getElementById('rSynonyms');
    if (synEl) {
      if (synonyms.length) {
        synEl.innerHTML = synonyms.map(s =>
          `<span class="syn-tag" data-word="${s.replace(/"/g, '&quot;')}">${s}</span>`
        ).join('');
        synEl.querySelectorAll('.syn-tag').forEach(el => {
          el.addEventListener('click', () => selectSuggestion(el.dataset.word));
        });
        synEl.style.display = 'flex';
      } else {
        synEl.innerHTML = '';
        synEl.style.display = 'none';
      }
    }

    card.classList.remove('loading');
    document.getElementById('moreLink').href =
      `https://www.merriam-webster.com/dictionary/${encodeURIComponent(entry.word)}`;
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);

  } catch(e) {
    clearTimeout(timeout);
    card.classList.remove('visible', 'loading');
    errorMsg.textContent = e.name === 'AbortError'
      ? '時間がかかりすぎました。もう一度お試しください。'
      : !navigator.onLine
        ? 'オフラインです。ネットワーク接続を確認してください。'
        : e.message === 'not_found'
          ? `"${word}" は見つかりませんでした。スペルを確認してください。`
          : '取得に失敗しました。もう一度お試しください。';
    errorMsg.classList.add('visible');
  }

  btn.disabled = false;
  btn.textContent = '調べる';
}

// ── SAVE WORD ──
function saveWord() {
  if (!currentResult) return;
  const alreadySaved = words.some(w => w.word === currentResult.word);
  if (alreadySaved) return;

  const entry = { word: currentResult.word, phonetic: currentResult.phonetic, pos: currentResult.pos, definition: currentResult.definition, examples: currentResult.examples, synonyms: currentResult.synonyms, id: Date.now().toString(), savedAt: Date.now() };
  words.push(entry);
  save();
  renderList();

  const btn = document.getElementById('btnSave');
  btn.textContent = '✓ 保存済み';
  btn.className = 'btn-save saved';
  btn.disabled = true;
  showToast(`"${currentResult.word}" を保存しました`);

  // Auto-dismiss card and reset for next word
  setTimeout(() => {
    dismissResult();
    const input = document.getElementById('searchInput');
    input.value = '';
    input.focus();
  }, 1200);
}

function dismissResult() {
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('moreLink').href = '';
  document.getElementById('searchHint').textContent = '';
  currentResult = null;
}

// ── ENTER KEY ──
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupWord();
});
document.getElementById('searchInput').addEventListener('input', e => {
  const val = e.target.value.trim().toLowerCase();
  const hint = document.getElementById('searchHint');
  showSuggestions(val);
  if (!val) { hint.textContent = ''; return; }
  const match = words.find(w => w.word === val);
  hint.textContent = match ? `✓ 保存済み — ${(match.definition || match.meaningJp || '').slice(0, 60)}` : '';
});

// ── FAB: focus search ──
function focusSearch() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => document.getElementById('searchInput').focus(), 300);
}

// ── TOAST ──
let undoTimer = null;
let deletedWord = null;

function showToast(msg, undoable = false) {
  const t = document.getElementById('toast');
  clearTimeout(undoTimer);
  if (undoable && deletedWord) {
    t.innerHTML = `${msg} <button class="toast-undo-btn" onclick="undoDelete()">元に戻す</button>`;
  } else {
    t.textContent = msg;
  }
  t.classList.add('show');
  undoTimer = setTimeout(() => {
    t.classList.remove('show');
    deletedWord = null;
  }, 3000);
}

function undoDelete() {
  if (!deletedWord) return;
  words.push(deletedWord);
  words.sort((a, b) => a.savedAt - b.savedAt);
  deletedWord = null;
  save();
  renderList();
  const t = document.getElementById('toast');
  t.classList.remove('show');
  clearTimeout(undoTimer);
  showToast('元に戻しました');
}

// Build a prefix index for fast filtering
const prefixIndex = {};
for (const w of WORDLIST) {
  const key = w.slice(0, 2).toLowerCase();
  if (!prefixIndex[key]) prefixIndex[key] = [];
  prefixIndex[key].push(w);
}

// Levenshtein distance (bounded for performance)
function levenshtein(a, b, maxDist = 3) {
  if (Math.abs(a.length - b.length) > maxDist) return maxDist + 1;
  const m = a.length, n = b.length;
  let prev = Array.from({length: n + 1}, (_, i) => i);
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      curr[j] = Math.min(curr[j-1]+1, prev[j]+1, prev[j-1]+cost);
    }
    prev = curr;
  }
  return prev[n];
}

// Get spell suggestions for a query
function getSpellSuggestions(query, maxResults = 5) {
  if (query.length < 2) return [];
  const q = query.toLowerCase();

  // Exact match → no suggestions needed
  if (WORDLIST.includes(q)) return [];

  const results = [];
  const seen = new Set();

  // ── Pass 1: 前方一致（オートコンプリート）──
  // 入力が単語の先頭に完全一致しているものを優先収集
  for (const w of WORDLIST) {
    if (w.startsWith(q) && w !== q) {
      results.push({ word: w, priority: 0, dist: w.length - q.length });
      seen.add(w);
    }
  }
  // 前方一致は単語の短い順に並べる（superficialより super に近いものを上に）
  results.sort((a, b) => a.dist - b.dist);

  // 前方一致だけで maxResults 埋まるなら終了
  if (results.length >= maxResults) {
    return results.slice(0, maxResults).map(s => s.word);
  }

  // ── Pass 2: スペル修正（Levenshtein）──
  // 前方一致が足りない場合に補完
  for (const w of WORDLIST) {
    if (seen.has(w)) continue;

    // 前方一致の長さ
    let prefixMatch = 0;
    for (let i = 0; i < Math.min(q.length, w.length); i++) {
      if (q[i] === w[i]) prefixMatch++;
      else break;
    }
    if (prefixMatch < Math.floor(q.length / 2)) continue;

    const dist = levenshtein(q, w, 3);
    if (dist > 2) continue;

    results.push({ word: w, priority: 1, dist });
    seen.add(w);
  }

  results.sort((a, b) =>
    a.priority - b.priority ||
    a.dist - b.dist
  );

  return results.slice(0, maxResults).map(s => s.word);
}

// Highlight differing chars in suggestion
function highlightDiff(query, suggestion) {
  const q = query.toLowerCase();
  let html = '';
  for (let i = 0; i < suggestion.length; i++) {
    // 入力済みの範囲内で一致 → 通常表示、それ以外 → 強調
    if (i < q.length && suggestion[i] === q[i]) {
      html += suggestion[i];
    } else if (i >= q.length) {
      // 前方一致で入力より長い部分 → accentで表示
      html += `<em>${suggestion[i]}</em>`;
    } else {
      // スペルが違う文字
      html += `<em>${suggestion[i]}</em>`;
    }
  }
  return html;
}

let suggestTimer = null;

function showSuggestions(query) {
  const box = document.getElementById('suggestions');
  if (!query || query.length < 2) { box.innerHTML = ''; return; }

  clearTimeout(suggestTimer);
  suggestTimer = setTimeout(() => {
    const sugs = getSpellSuggestions(query);
    if (sugs.length === 0) { box.innerHTML = ''; return; }
    box.innerHTML = `<div class="suggestion-list">${sugs.map(w => `
      <div class="suggestion-item" onclick="selectSuggestion('${w}')">
        <span class="sug-word">${highlightDiff(query, w)}</span>
        <span class="sug-badge">did you mean?</span>
      </div>`).join('')}</div>`;
  }, 120);
}

function selectSuggestion(word) {
  const input = document.getElementById('searchInput');
  input.value = word;
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('searchHint').textContent = '';
  const hint = document.getElementById('searchHint');
  const match = words.find(w => w.word === word);
  hint.textContent = match ? `✓ 保存済み — ${(match.definition || match.meaningJp || '').slice(0, 60)}` : '';
  input.focus();
}

// init
renderList();
// Auto-focus on load
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('searchInput').focus(), 300);
});
</script>
